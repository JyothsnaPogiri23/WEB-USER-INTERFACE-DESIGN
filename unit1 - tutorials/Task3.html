<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Demonstration</title>
</head>
<body>

    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>

    <p>
        This is a paragraph demonstrating various HTML text formatting tags.
    </p>

    <p>
        <b>Thisis Bold Text</b>
    </p>

    <p>
        <i>you all know this is the Italic Text</i>
    </p>

    <p>
        <u>Underlined Text</u>
    </p>

    <p>
        Water Formula: H<sub>2</sub>O
    </p>

    <p>
        Mathematical Expression: x<sup>2</sup> + y<sup>2</sup>
    </p>

</body>
</html>
