<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>
</head>
<body>

    <h1>Student Feedback Form</h1>

    <form>

        <label for="name">Student Name:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="rollno">Roll Number:</label><br>
        <input type="text" id="rollno" name="rollno"><br><br>

        <label for="department">Department:</label><br>
        <input type="text" id="department" name="department"><br><br>

        <label for="faculty">Faculty Name:</label><br>
        <input type="text" id="faculty" name="faculty"><br><br>

        <label>How do you rate the teaching quality?</label><br>

        <input type="radio" name="rating" value="Excellent"> Excellent
        <input type="radio" name="rating" value="Good"> Good
        <input type="radio" name="rating" value="Average"> Average
        <input type="radio" name="rating" value="Poor"> Poor

        <br><br>

        <label>Facilities Used:</label><br>

        <input type="checkbox" name="facility" value="Library"> Library
        <input type="checkbox" name="facility" value="Laboratory"> Laboratory
        <input type="checkbox" name="facility" value="Wi-Fi"> Wi-Fi
        <input type="checkbox" name="facility" value="Sports"> Sports

        <br><br>

        <label for="suggestions">Suggestions:</label><br>
        <textarea id="suggestions" rows="5" cols="40"></textarea>

        <br><br>

        <input type="submit" value="Submit Feedback">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
