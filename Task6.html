<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
</head>
<body>

    <h1>My Image Gallery</h1>

    <figure>
        <img src="nature.jpg" alt="Beautiful Nature Scene" width="300">
        <figcaption>Nature View</figcaption>
    </figure>

    <figure>
        <img src="mountain.jpg" alt="Mountain Landscape" width="300">
        <figcaption>Mountain View</figcaption>
    </figure>

    <figure>
        <img src="beach.jpg" alt="Sunny Beach" width="300">
        <figcaption>Beach View</figcaption>
    </figure>

</body>
</html>
