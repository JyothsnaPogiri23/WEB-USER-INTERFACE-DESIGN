<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- Navigation -->

<nav>

    <h2>❤️ HealthCare+</h2>

    <ul>

        <li><a href="index.html">Home</a></li>

        <li><a href="doctors.html">Doctors</a></li>

        <li><a href="appointment.html">Appointment</a></li>

        <li><a href="services.html">Services</a></li>

        <li><a href="contact.html">Contact</a></li>

    </ul>

</nav>

<!-- Heading -->

<section class="page-title">

    <h1>Book an Appointment</h1>

    <p>Fill in your details and schedule your visit.</p>

</section>

<!-- Appointment Form -->

<section class="appointment-section">

<div class="appointment-form">

<form>

<div class="row">

<div class="input-box">

<label>Full Name</label>

<input type="text" placeholder="Enter your name">

</div>

<div class="input-box">

<label>Phone Number</label>

<input type="tel" placeholder="Enter phone number">

</div>

</div>


<div class="row">

<div class="input-box">

<label>Email</label>

<input type="email" placeholder="Enter email">

</div>

<div class="input-box">

<label>Age</label>

<input type="number" placeholder="Enter age">

</div>

</div>


<div class="row">

<div class="input-box">

<label>Gender</label>

<select>

<option>Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-box">

<label>Select Doctor</label>

<select>

<option>Choose Doctor</option>

<option>Dr. Priya Sharma</option>

<option>Dr. Rahul Kumar</option>

<option>Dr. Anjali Rao</option>

<option>Dr. Vivek Patel</option>

<option>Dr. Sneha Reddy</option>

</select>

</div>

</div>


<div class="row">

<div class="input-box">

<label>Appointment Date</label>

<input type="date">

</div>

<div class="input-box">

<label>Preferred Time</label>

<input type="time">

</div>

</div>


<div class="input-box">

<label>Symptoms / Health Issue</label>

<textarea rows="5"
placeholder="Describe your symptoms..."></textarea>

</div>

<button class="submit-btn">

Book Appointment

</button>

</form>

</div>

</section>

<!-- Footer -->

<footer>

<p>

© 2026 HealthCare Appointment System

</p>

</footer>

</body>
</html>
